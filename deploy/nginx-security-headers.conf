# SC// Sizer — reverse-proxy security headers
# =============================================
# These add the app's security headers at the TLS-terminating nginx proxy.
#
# This proxy is a SHARED vhost (one server block fronts several backends), so
# the headers are scoped to the sizer's host with `map`s: every header resolves
# to "" for any other host, and nginx omits an add_header whose value is empty.
# Result — only the sizer host gets these; every other backend keeps exactly its
# own headers, untouched and un-duplicated.
#
# Set $SIZER_HOST below to the sizer's public hostname.
#
# HOW TO USE
#   1. Put the `map` blocks in the http context — i.e. ABOVE the server {}
#      blocks (a file in conf.d/ is already inside http{}). Maps are not allowed
#      inside server{}.
#   2. Put the `add_header` lines inside the 443 server {} that serves the app,
#      at the server level (not inside a location).
#   3. nginx -t && nginx -s reload
#
# nginx gotchas:
#   * An add_header with an EMPTY value is skipped — that's what scopes these to
#     the sizer host only.
#   * If ANY `location` block defines its own add_header, nginx drops ALL
#     inherited add_headers in that location. Keep these at the server level (or
#     repeat them in such a location).
#   * `always` emits the header on error responses (4xx/5xx) too.
#
# Cookie note: if this proxy already hardens cookies for all backends (e.g. a
# proxy_cookie_path / "...; Secure; HttpOnly; SameSite=Lax"), leave it as-is and
# do NOT also set SESSION_COOKIE_SECURE=true in the app — let the proxy be the
# single source so the cookie flags aren't duplicated.

# ── http context: scope every sizer header to $SIZER_HOST (set this) ──────────
# Replace betasizer.demolabs.me with your sizer host. No other hostnames belong
# in this file — siblings are covered by the `default ""` branch.
map $host $sizer_csp {
    default "";
    betasizer.demolabs.me "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'";
}
map $host $sizer_xfo {
    default "";
    betasizer.demolabs.me "DENY";
}
map $host $sizer_nosniff {
    default "";
    betasizer.demolabs.me "nosniff";
}
map $host $sizer_referrer {
    default "";
    betasizer.demolabs.me "strict-origin-when-cross-origin";
}
map $host $sizer_permissions {
    default "";
    betasizer.demolabs.me "geolocation=(), microphone=(), camera=(), payment=()";
}

# ── server {} (443) context: add at the server level ──────────────────────────
# Content-Security-Policy is defense-in-depth behind the server-side output
# escaping (the real XSS fix). 'unsafe-inline' is required for now because the UI
# uses an inline <script> bootstrap and inline on* handlers in generated markup;
# even so it still blocks external/object script injection, confines fetch/XHR to
# same-origin (connect-src), and hard-denies framing. FUTURE: move inline handlers
# to addEventListener + the bootstrap to a nonce/external file, then drop
# 'unsafe-inline' from script-src.
#
#     add_header Content-Security-Policy $sizer_csp         always;
#     add_header X-Frame-Options         $sizer_xfo         always;  # also covered by frame-ancestors
#     add_header X-Content-Type-Options  $sizer_nosniff     always;  # block MIME sniffing
#     add_header Referrer-Policy         $sizer_referrer    always;  # don't leak ?reset=<token> URLs
#     add_header Permissions-Policy      $sizer_permissions always;  # drop unused browser features
#
# HSTS is usually already set once for the whole proxy; if not, add (1 year):
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
