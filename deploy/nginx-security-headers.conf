# SC// Sizer — reverse-proxy security headers
# =============================================
# Apply these on the nginx vhost that terminates TLS for betasizer.demolabs.me.
#
# HOW TO USE
#   Put this file next to your site config and include it INSIDE the
#   `server { ... }` block that listens on 443 for this site:
#
#       server {
#           listen 443 ssl;
#           server_name betasizer.demolabs.me;
#           ...
#           include /etc/nginx/snippets/sizer-security-headers.conf;
#           location / {
#               proxy_pass http://127.0.0.1:5050;
#               proxy_set_header Host              $host;
#               proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#               proxy_set_header X-Forwarded-Proto $scheme;
#               # NOTE: do NOT also set `proxy_cookie_flags ... secure samesite=lax`
#               # here. With SESSION_COOKIE_SECURE=true in the app, the app is the
#               # single source of the cookie flags; setting them here too produces
#               # the duplicated "Secure; HttpOnly; SameSite=Lax; SameSite=Lax" header.
#           }
#       }
#   Then: nginx -t && systemctl reload nginx
#
# IMPORTANT nginx gotcha: if ANY `location` block defines its own `add_header`,
# nginx drops ALL inherited add_header directives in that location. Either keep
# add_header only at the server level (as below) or repeat this include in each
# location that sets its own headers. The `always` flag emits the header on
# error responses (4xx/5xx) too, not just 2xx/3xx.

# Force HTTPS for this host (and its sub-hosts) for a year. The app already
# 301s http->https; HSTS closes the first-request / SSL-strip window.
# Add `; preload` only once you're committed (hard to undo + submit to the
# preload list). Drop `includeSubDomains` if other demolabs.me hosts must stay HTTP.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Clickjacking: this app is never meant to be framed. frame-ancestors (CSP) is
# the modern control; X-Frame-Options covers older browsers.
add_header X-Frame-Options "DENY" always;

# Stop MIME sniffing (e.g. a text upload being run as a script).
add_header X-Content-Type-Options "nosniff" always;

# Don't leak full URLs (which can carry a ?reset=<token>) to third parties.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Drop ambient access to powerful browser features the app doesn't use.
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# Content-Security-Policy — defense-in-depth behind the server-side output
# escaping (the real XSS fix). 'unsafe-inline' is required for now because the
# UI uses an inline <script> bootstrap and inline on* handlers in generated
# markup; even so this still blocks external/object script injection, restricts
# exfiltration to same-origin (connect-src), and hard-denies framing.
# FUTURE: move inline handlers to addEventListener and the bootstrap to a
# nonce/external file, then drop 'unsafe-inline' from script-src for full value.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
