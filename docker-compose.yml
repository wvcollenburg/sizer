services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sizer
      POSTGRES_PASSWORD: sizer
      POSTGRES_DB: sizer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sizer"]
      interval: 5s
      timeout: 3s
      retries: 5

  sizer:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sizer:sizer@db:5432/sizer
      # SECRET_KEY, SUPER_ADMIN_EMAIL, SUPER_ADMIN_PASSWORD come from .env (see
      # .env.template). SECRET_KEY must be set so logins persist across the two
      # gunicorn workers.
    restart: unless-stopped

volumes:
  pgdata:
